# =============================================================================
# GitHub Actions Deployment Workflow
# Target: Alibaba Cloud ECS @ 8.130.125.201
# Domain: quant.superalpha.com.cn
# Repo: https://github.com/jackeyunjie/hermass-strategyquant-replica
# =============================================================================
name: Deploy to Alibaba Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend static assets
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npm run build

      - name: Package release archive
        run: |
          set -euo pipefail
          mkdir -p .release
          tar \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='*/.env' \
            --exclude='.release' \
            --exclude='node_modules' \
            --exclude='*/node_modules' \
            --exclude='__pycache__' \
            --exclude='*/__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='*/.pytest_cache' \
            -czf .release/hermass-release.tgz .

      - name: Upload release archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          source: .release/hermass-release.tgz
          target: /tmp
          strip_components: 1
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script_stop: true
          timeout: 300s
          command_timeout: 25m
          script: |
            set -euo pipefail

            APP_DIR="/opt/hermass-strategyquant-replica"
            ARCHIVE="/tmp/hermass-release.tgz"
            ENV_BACKUP="/tmp/hermass.env.$$"
            DEPLOY_ENV_BACKUP="/tmp/hermass.deploy.env.$$"

            echo "=== Hermass GitHub Actions Deployment ==="
            echo "Timestamp: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "App dir: $APP_DIR"

            if [ ! -f "$ARCHIVE" ]; then
              echo "[ERROR] Release archive not found: $ARCHIVE"
              exit 1
            fi

            mkdir -p "$APP_DIR"

            if [ -f "$APP_DIR/.env" ]; then
              cp "$APP_DIR/.env" "$ENV_BACKUP"
              echo "[INFO] Preserved existing .env"
            fi
            if [ -f "$APP_DIR/deploy/.env" ]; then
              cp "$APP_DIR/deploy/.env" "$DEPLOY_ENV_BACKUP"
            fi

            echo "[INFO] Replacing application files from release archive..."
            find "$APP_DIR" -mindepth 1 -maxdepth 1 ! -name ".env" -exec rm -rf {} +
            tar -xzf "$ARCHIVE" -C "$APP_DIR"

            if [ -f "$ENV_BACKUP" ]; then
              mv "$ENV_BACKUP" "$APP_DIR/.env"
            fi
            mkdir -p "$APP_DIR/deploy"
            if [ -f "$DEPLOY_ENV_BACKUP" ]; then
              mv "$DEPLOY_ENV_BACKUP" "$APP_DIR/deploy/.env"
            fi

            {
              printf 'commit=%s\n' '${{ github.sha }}'
              printf 'ref=%s\n' '${{ github.ref_name }}'
              printf 'workflow_run=%s\n' '${{ github.run_id }}'
              printf 'deployed_at=%s\n' "$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
              printf 'url=%s\n' 'http://quant.superalpha.com.cn'
            } > "$APP_DIR/DEPLOYED_VERSION"

            chmod +x "$APP_DIR/deploy/deploy.sh" "$APP_DIR/deploy/server-setup.sh" "$APP_DIR/scripts/prod_smoke.sh" || true

            # Run CI deployment script
            echo "[INFO] Running deployment script..."
            cd "$APP_DIR/deploy"
            bash deploy.sh --ci

            echo "[INFO] Verifying local health endpoint..."
            for attempt in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8081/health; then
                echo "[INFO] Local health endpoint is ready."
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "[ERROR] Local health endpoint did not become ready."
                exit 1
              fi
              sleep 10
            done

            echo "[INFO] Deployment completed successfully."

      - name: Verify public health endpoint
        run: |
          set -euo pipefail
          curl -fsS http://quant.superalpha.com.cn/health
