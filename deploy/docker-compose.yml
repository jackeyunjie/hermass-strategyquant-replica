name: hermass-strategyquant

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: hermass-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-hermass}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-hermass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hermass-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hermass} -d ${DB_NAME:-hermass}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: hermass-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - hermass-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: hermass-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://hermass:changeme@db:5432/hermass}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      - APP_NAME=${APP_NAME:-Hermass StrategyQuant}
      - DEBUG=${DEBUG:-false}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-https://quant.superalpha.com.cn}
    networks:
      - hermass-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Worker
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: hermass-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://hermass:changeme@db:5432/hermass}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEBUG=${DEBUG:-false}
    networks:
      - hermass-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping --timeout=5 >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # Celery Beat (scheduled tasks)
  beat:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: hermass-beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://hermass:changeme@db:5432/hermass}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEBUG=${DEBUG:-false}
    networks:
      - hermass-network
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx — serves frontend static + proxies /api/ to backend
  nginx:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: hermass-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:${NGINX_PORT:-8081}:80"
    networks:
      - hermass-network
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  hermass-network:
    driver: bridge
